<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БОГ ЗАБЫВЧИВ</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .fullscreen-bg {
            background-image: url('https://i.ibb.co/GQpbDdYd/istockphoto-1298288541-640x640.png');

            /* Full height and width */
            height: 100%; 

            /* Center and scale the image perfectly */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }
    </style>
</head>
<body>

    <div class="fullscreen-bg"></div>

</body>
</html>
