<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #000;
  }
  #msg {
    font-family: 'JetBrains Mono', monospace;
    color: #FFD700;
    font-size: 1.5rem;
    opacity: 0;
    animation: fadeIn 2s forwards;
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>
<p id="msg"></p>
<script>
  const phrases = ["Не сейчас.", "Сейчас не время для этого.", "Не самый подходящий для этого момент."];
  document.getElementById('msg').textContent = phrases[Math.floor(Math.random() * phrases.length)];
</script>
</body>
</html>
